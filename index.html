<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sprintforge</title>
  </head>
  <body>
    <div id="root">
      <div
        style="
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 24px;
          color: #e2e8f0;
          font-family: Inter, Arial, sans-serif;
          background:
            radial-gradient(circle at top left, rgba(124, 58, 237, 0.28), transparent 26%),
            radial-gradient(circle at top right, rgba(14, 165, 233, 0.2), transparent 24%),
            linear-gradient(180deg, #020617 0%, #0f172a 45%, #111827 100%);
        "
      >
        <div
          style="
            width: 100%;
            max-width: 760px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(15, 23, 42, 0.78);
            border-radius: 28px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            backdrop-filter: blur(18px);
          "
        >
          <p style="margin: 0; color: #a78bfa; font-size: 12px; letter-spacing: 0.28em; text-transform: uppercase; font-weight: 700;">
            Sprintforge
          </p>
          <h1 style="margin: 16px 0 0; font-size: 40px; line-height: 1.1; color: white;">
            Loading project dashboard...
          </h1>
          <p style="margin: 16px 0 0; color: #cbd5e1; font-size: 15px; line-height: 1.7;">
            If this message stays on screen, the app is failing before React mounts. That means we now have a visible
            fallback instead of a blank page while debugging startup issues.
          </p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
